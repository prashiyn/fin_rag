openapi: 3.1.0
info:
  title: FinSage RAG Agent
  description: Multi-retrieval RAG API — chat, streaming, feedback, and internal assistant.
  version: 0.1.0
paths:
  /health:
    get:
      tags:
      - Health
      summary: Health check
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/check_token:
    get:
      tags:
      - Auth
      summary: Validate bearer token
      operationId: check_token_api_check_token_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api_chat:
    post:
      tags:
      - Chat
      summary: Synchronous Q&A
      operationId: api_chat_api_chat_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiChatRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
        '400':
          description: Bad request (e.g. question not provided)
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api_chat_stream:
    post:
      tags:
      - Chat
      summary: Streaming Q&A (SSE)
      operationId: api_chat_stream_api_chat_stream_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiChatRequest'
        required: true
      responses:
        '200':
          description: SSE stream of chunks
          content:
            application/json:
              schema: {}
            text/event-stream: {}
        '400':
          description: Bad request
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /test_api_chat:
    get:
      tags:
      - Chat
      summary: Test chat UI (returns HTML)
      operationId: test_api_chat_test_api_chat_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /feedback:
    get:
      tags:
      - Feedback
      summary: Feedback list UI (returns HTML)
      operationId: feedback_feedback_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/internal_assistant:
    post:
      tags:
      - Internal
      summary: Add internal assistant message to a session
      operationId: internal_assistant_api_internal_assistant_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalAssistantRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/log:
    get:
      tags:
      - Logs
      summary: Get runtime log for a session
      operationId: get_log_api_log_get
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Session ID
          title: Session Id
        description: Session ID
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
        '400':
          description: Session ID not provided
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/report_error:
    post:
      tags:
      - Internal
      summary: Report client error and save session log
      operationId: report_error_api_report_error_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportErrorRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/submit_rating:
    post:
      tags:
      - Feedback
      summary: Submit rating and optional feedback for a response
      operationId: submit_rating_api_submit_rating_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitRatingRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
        '400':
          description: Missing required fields or invalid rating
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
components:
  schemas:
    ApiChatRequest:
      properties:
        question:
          type: string
          title: Question
          description: User question
        session_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Id
          description: Session ID; generated if omitted
        internal_input:
          anyOf:
          - {}
          - type: 'null'
          title: Internal Input
          description: Optional internal assistant context
        interrupt_index:
          anyOf:
          - type: integer
          - type: 'null'
          title: Interrupt Index
          description: Optional interrupt index for editing
      type: object
      required:
      - question
      title: ApiChatRequest
      description: Request body for synchronous and streaming chat.
    ApiEnvelope:
      properties:
        status:
          type: string
          title: Status
          description: '''success'' or ''error'''
        message:
          type: string
          title: Message
          description: Human-readable message
        data:
          anyOf:
          - {}
          - type: 'null'
          title: Data
          description: Payload when status is success
      type: object
      required:
      - status
      - message
      title: ApiEnvelope
      description: Standard API response envelope.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    InternalAssistantRequest:
      properties:
        session_id:
          type: string
          title: Session Id
          description: Session ID
        message:
          type: string
          title: Message
          description: Internal assistant message
      type: object
      required:
      - session_id
      - message
      title: InternalAssistantRequest
      description: Request body for adding an internal assistant message to a session.
    ReportErrorRequest:
      properties:
        session_id:
          type: string
          title: Session Id
          description: Session ID
        error_message:
          type: string
          title: Error Message
          description: Error description from the client
      type: object
      required:
      - session_id
      - error_message
      title: ReportErrorRequest
      description: Request body for reporting a client error.
    SubmitRatingRequest:
      properties:
        session_id:
          type: string
          title: Session Id
          description: Session ID
        response_id:
          type: string
          title: Response Id
          description: Response ID from the chat stream
        rating:
          type: integer
          maximum: 5.0
          minimum: 1.0
          title: Rating
          description: Rating 1-5
        question:
          type: string
          title: Question
          description: Original question
        response_content:
          type: string
          title: Response Content
          description: The response text being rated
        feedback:
          anyOf:
          - type: string
          - type: 'null'
          title: Feedback
          description: Optional free-text feedback
        user:
          anyOf:
          - type: string
          - type: 'null'
          title: User
          description: Optional user identifier
      type: object
      required:
      - session_id
      - response_id
      - rating
      - question
      - response_content
      title: SubmitRatingRequest
      description: Request body for submitting feedback rating for a response.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
  securitySchemes:
    HTTPBearer:
      type: http
      scheme: bearer
