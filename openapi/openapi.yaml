openapi: 3.1.0
info:
  title: FinSage RAG Agent
  description: Multi-retrieval RAG API — chat, streaming, feedback, and internal assistant.
  version: 0.1.0
paths:
  /health:
    get:
      tags:
      - Health
      summary: Health check
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/check_token:
    get:
      tags:
      - Auth
      summary: Validate bearer token
      operationId: check_token_api_check_token_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /load-data:
    post:
      tags:
      - Ingestion
      summary: Create/load collection data into Chroma + BM25
      operationId: load_data_load_data_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoadDataRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api_chat:
    post:
      tags:
      - Chat
      summary: Synchronous Q&A
      operationId: api_chat_api_chat_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiChatRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
        '400':
          description: Bad request (e.g. question not provided)
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api_chat_stream:
    post:
      tags:
      - Chat
      summary: Streaming Q&A (SSE)
      operationId: api_chat_stream_api_chat_stream_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiChatRequest'
        required: true
      responses:
        '200':
          description: SSE stream of chunks
          content:
            application/json:
              schema: {}
            text/event-stream: {}
        '400':
          description: Bad request
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /test_api_chat:
    get:
      tags:
      - Chat
      summary: Test chat UI (returns HTML)
      operationId: test_api_chat_test_api_chat_get
      parameters:
      - name: collection_name
        in: query
        required: true
        schema:
          type: string
          description: Collection name
          title: Collection Name
        description: Collection name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /feedback:
    get:
      tags:
      - Feedback
      summary: Feedback list UI (returns HTML)
      operationId: feedback_feedback_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/internal_assistant:
    post:
      tags:
      - Internal
      summary: Add internal assistant message to a session
      operationId: internal_assistant_api_internal_assistant_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalAssistantRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/log:
    get:
      tags:
      - Logs
      summary: Get runtime log for a session
      operationId: get_log_api_log_get
      security:
      - HTTPBearer: []
      parameters:
      - name: collection_name
        in: query
        required: true
        schema:
          type: string
          description: Collection name
          title: Collection Name
        description: Collection name
      - name: session_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Session ID
          title: Session Id
        description: Session ID
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
        '400':
          description: Session ID not provided
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/treerag/tree:
    get:
      tags:
      - Chat
      summary: Get last TreeRAG tree for a session
      operationId: treerag_tree_api_treerag_tree_get
      security:
      - HTTPBearer: []
      parameters:
      - name: collection_name
        in: query
        required: true
        schema:
          type: string
          description: Collection name
          title: Collection Name
        description: Collection name
      - name: session_id
        in: query
        required: true
        schema:
          type: string
          description: Session ID
          title: Session Id
        description: Session ID
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/treerag/node:
    get:
      tags:
      - Chat
      summary: Get details for a TreeRAG node
      operationId: treerag_node_api_treerag_node_get
      security:
      - HTTPBearer: []
      parameters:
      - name: collection_name
        in: query
        required: true
        schema:
          type: string
          description: Collection name
          title: Collection Name
        description: Collection name
      - name: session_id
        in: query
        required: true
        schema:
          type: string
          description: Session ID
          title: Session Id
        description: Session ID
      - name: node_id
        in: query
        required: true
        schema:
          type: string
          description: Node ID
          title: Node Id
        description: Node ID
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/report_error:
    post:
      tags:
      - Internal
      summary: Report client error and save session log
      operationId: report_error_api_report_error_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportErrorRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/submit_rating:
    post:
      tags:
      - Feedback
      summary: Submit rating and optional feedback for a response
      operationId: submit_rating_api_submit_rating_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitRatingRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
        '400':
          description: Missing required fields or invalid rating
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
components:
  schemas:
    ApiChatRequest:
      properties:
        collection_name:
          type: string
          title: Collection Name
          description: Collection to query
        question:
          type: string
          title: Question
          description: User question
        session_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Id
          description: Session ID; generated if omitted
        internal_input:
          anyOf:
          - {}
          - type: 'null'
          title: Internal Input
          description: Optional internal assistant context
        interrupt_index:
          anyOf:
          - type: integer
          - type: 'null'
          title: Interrupt Index
          description: Optional interrupt index for editing
        strategy:
          anyOf:
          - type: string
          - type: 'null'
          title: Strategy
          description: Optional strategy override. Use 'treerag' to enable TreeRAG for this request.
        treerag_max_depth:
          anyOf:
          - type: integer
          - type: 'null'
          title: Treerag Max Depth
          description: Optional TreeRAG max depth override when strategy='treerag'.
          minimum: 0
      type: object
      required:
      - collection_name
      - question
      title: ApiChatRequest
      description: Request body for synchronous and streaming chat.
    ApiEnvelope:
      properties:
        status:
          type: string
          title: Status
          description: '''success'' or ''error'''
        message:
          type: string
          title: Message
          description: Human-readable message
        data:
          anyOf:
          - {}
          - type: 'null'
          title: Data
          description: Payload when status is success
      type: object
      required:
      - status
      - message
      title: ApiEnvelope
      description: Standard API response envelope.
    Chunk:
      properties:
        chunk_id:
          type: string
          title: Chunk Id
        content:
          type: string
          title: Content
        type:
          type: string
          enum:
          - text
          - table
          - image
          title: Type
        doc_id:
          type: string
          title: Doc Id
        page:
          anyOf:
          - type: integer
          - type: 'null'
          title: Page
        bundle_id:
          type: string
          title: Bundle Id
        section_title:
          anyOf:
          - type: string
          - type: 'null'
          title: Section Title
        title_summary:
          type: string
          title: Title Summary
          default: ''
        publish_date:
          anyOf:
          - type: string
          - type: 'null'
          title: Publish Date
        prev_chunk:
          anyOf:
          - type: string
          - type: 'null'
          title: Prev Chunk
        next_chunk:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Chunk
      type: object
      required:
      - chunk_id
      - content
      - type
      - doc_id
      - bundle_id
      title: Chunk
      description: 'Canonical chunk object: content (original text/table/image), type,
        and metadata.'
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    InternalAssistantRequest:
      properties:
        collection_name:
          type: string
          title: Collection Name
          description: Collection to operate on
        session_id:
          type: string
          title: Session Id
          description: Session ID
        message:
          type: string
          title: Message
          description: Internal assistant message
      type: object
      required:
      - collection_name
      - session_id
      - message
      title: InternalAssistantRequest
      description: Request body for adding an internal assistant message to a session.
    LoadDataContent:
      properties:
        page_start:
          type: integer
          title: Page Start
          description: Start page for ingest filter
        page_end:
          type: integer
          title: Page End
          description: End page for ingest filter
        page_date_published:
          anyOf:
          - type: string
          - type: 'null'
          title: Page Date Published
          description: Document publish date
        chunks:
          items:
            $ref: '#/components/schemas/Chunk'
          type: array
          title: Chunks
      type: object
      required:
      - page_start
      - page_end
      - chunks
      title: LoadDataContent
    LoadDataRequest:
      properties:
        collection:
          type: string
          title: Collection
        data:
          $ref: '#/components/schemas/LoadDataContent'
      type: object
      required:
      - collection
      - data
      title: LoadDataRequest
    ReportErrorRequest:
      properties:
        collection_name:
          type: string
          title: Collection Name
          description: Collection to operate on
        session_id:
          type: string
          title: Session Id
          description: Session ID
        error_message:
          type: string
          title: Error Message
          description: Error description from the client
      type: object
      required:
      - collection_name
      - session_id
      - error_message
      title: ReportErrorRequest
      description: Request body for reporting a client error.
    SubmitRatingRequest:
      properties:
        collection_name:
          type: string
          title: Collection Name
          description: Collection to operate on
        session_id:
          type: string
          title: Session Id
          description: Session ID
        response_id:
          type: string
          title: Response Id
          description: Response ID from the chat stream
        rating:
          type: integer
          maximum: 5.0
          minimum: 1.0
          title: Rating
          description: Rating 1-5
        question:
          type: string
          title: Question
          description: Original question
        response_content:
          type: string
          title: Response Content
          description: The response text being rated
        feedback:
          anyOf:
          - type: string
          - type: 'null'
          title: Feedback
          description: Optional free-text feedback
        user:
          anyOf:
          - type: string
          - type: 'null'
          title: User
          description: Optional user identifier
      type: object
      required:
      - collection_name
      - session_id
      - response_id
      - rating
      - question
      - response_content
      title: SubmitRatingRequest
      description: Request body for submitting feedback rating for a response.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
  securitySchemes:
    HTTPBearer:
      type: http
      scheme: bearer
